  <script type="importmap">

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let camera, controls, scene, renderer;
    let mesh;
    let raycaster, mouse;
    
    // Variables para el enfoque dinámico
    let targetFocus = new THREE.Vector3(0, 0, 0);
    let isFocusing = false;
    
    // Objeto y color auxiliares
    const dummy = new THREE.Object3D();
    const colorAux = new THREE.Color();

    init();

    function init() {
      scene = new THREE.Scene();
      // Fondo más oscuro para resaltar los colores neón y la cuadrícula
      scene.background = new THREE.Color(0x0f172a);
      scene.fog = new THREE.FogExp2(0x0f172a, 0.0012);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      
      // HABILITAMOS LAS SOMBRAS
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      
      renderer.setAnimationLoop(animate);
      document.body.appendChild(renderer.domElement);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
      camera.position.set(400, 200, 400);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.listenToKeyEvents(window);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.screenSpacePanning = false;
      controls.minDistance = 50;
      controls.maxDistance = 800;
      controls.maxPolarAngle = Math.PI / 2;

      // SUELO QUE RECIBE SOMBRAS
      const planeGeometry = new THREE.PlaneGeometry(3000, 3000);
      const planeMaterial = new THREE.MeshPhongMaterial({ color: 0x1e293b, depthWrite: false });
      const plane = new THREE.Mesh(planeGeometry, planeMaterial);
      plane.rotation.x = -Math.PI / 2;
      plane.position.y = -40; // Colocamos el suelo por debajo de los conos
      plane.receiveShadow = true;
      scene.add(plane);

      // MEJORA 5: CUADRÍCULA (GridHelper)
      // Tamaño 3000, 100 divisiones, color central azul brillante, color de la red azul tenue
      const gridHelper = new THREE.GridHelper(3000, 100, 0x3b82f6, 0x1e3a8a);
      gridHelper.position.y = -39.9; // Ligeramente por encima del suelo para evitar parpadeos (z-fighting)
      gridHelper.material.transparent = true;
      gridHelper.material.opacity = 0.4; // Semitransparente
      scene.add(gridHelper);

      // CREACIÓN DE LOS CONOS
      const geometry = new THREE.ConeGeometry(10, 30, 4, 1);
      
      // MEJORA 3 (Paso 1): Material base en blanco para que acepte bien el teñido de colores
      const material = new THREE.MeshPhongMaterial({
        color: 0xffffff,
        flatShading: true,
        shininess: 80 // Le da un ligero brillo plástico/metálico
      });

      mesh = new THREE.InstancedMesh(geometry, material, 500);
      
      // LOS CONOS PROYECTAN Y RECIBEN SOMBRAS
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      for (let i = 0; i < 500; i++) {
        dummy.position.x = Math.random() * 1600 - 800;
        dummy.position.y = Math.random() * 20;
        dummy.position.z = Math.random() * 1600 - 800;
        dummy.rotation.y = Math.random() * Math.PI;

        dummy.updateMatrix();
        mesh.setMatrixAt(i, dummy.matrix);

        // MEJORA 3 (Paso 2): Asignar un color aleatorio entre azul cian y morado neón
        // HSL: Tono(Hue) de 0.5 a 0.8, Saturación 80%, Luminosidad 50-70%
        colorAux.setHSL(Math.random() * 0.3 + 0.5, 0.8, Math.random() * 0.2 + 0.5);
        mesh.setColorAt(i, colorAux);
      }

      scene.add(mesh);

      // LUCES Y SOMBRAS
      const dirLight1 = new THREE.DirectionalLight(0xffffff, 2.5);
      dirLight1.position.set(200, 300, 200);
      dirLight1.castShadow = true;
      dirLight1.shadow.camera.top = 800;
      dirLight1.shadow.camera.bottom = -800;
      dirLight1.shadow.camera.left = -800;
      dirLight1.shadow.camera.right = 800;
      dirLight1.shadow.camera.near = 0.1;
      dirLight1.shadow.camera.far = 1500;
      dirLight1.shadow.mapSize.width = 2048;
      dirLight1.shadow.mapSize.height = 2048;
      scene.add(dirLight1);

      // Luz secundaria con tono magenta/morado para acentuar la vibra retro-futurista
      const dirLight2 = new THREE.DirectionalLight(0xa855f7, 1.5);
      dirLight2.position.set(-100, 100, -100);
      scene.add(dirLight2);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      // PREPARACIÓN DEL RAYCASTER
      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      window.addEventListener('resize', onWindowResize);
      window.addEventListener('dblclick', onDoubleClick);
    }

    // FUNCIÓN DE ENFOQUE DINÁMICO
    function onDoubleClick(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(mesh);

      if (intersects.length > 0) {
        const instanceId = intersects[0].instanceId;
        
        const matrix = new THREE.Matrix4();
        mesh.getMatrixAt(instanceId, matrix);
        
        targetFocus.setFromMatrixPosition(matrix);
        isFocusing = true;
      }
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      const time = performance.now() * 0.001;
      
      for (let i = 0; i < 500; i++) {
        mesh.getMatrixAt(i, dummy.matrix);
        dummy.matrix.decompose(dummy.position, dummy.quaternion, dummy.scale);
        
        dummy.rotation.y += 0.01;
        dummy.position.y = Math.sin(time * 2 + i) * 15;
        
        dummy.updateMatrix();
        mesh.setMatrixAt(i, dummy.matrix);
      }
      mesh.instanceMatrix.needsUpdate = true;

      if (isFocusing) {
        controls.target.lerp(targetFocus, 0.05);
        if (controls.target.distanceTo(targetFocus) < 0.5) {
          isFocusing = false;
        }
      }

      controls.update();
      render();
    }

    function render() {
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
