<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>three.js webgl - geometry - minecraft</title>
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

  <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧊</text></svg>">

  <style>
    body {
      background-color: #bfd1e5;
      color: #61443e;
      margin: 0;
      overflow: hidden;
    }

    a {
      color: #a06851;
    }

    #info {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      z-index: 100;
      display: block;
      font-family: Arial, sans-serif;
      font-size: 14px;
      pointer-events: auto;
    }
  </style>
</head>
<body>

  <div id="container"></div>

  <div id="info">
    <a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> -
    <a href="https://minecraft.net" target="_blank" rel="noopener">minecraft</a> demo
    <br>
    (left click: forward, right click: backward)
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "./assets/build/three.module.js",
      "three/addons/": "./assets/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    import Stats from 'three/addons/libs/stats.module.js';
    import { FirstPersonControls } from 'three/addons/controls/FirstPersonControls.js';
    import { ImprovedNoise } from 'three/addons/math/ImprovedNoise.js';
    import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

    let container, stats;
    let camera, controls, scene, renderer;

    const worldWidth = 128, worldDepth = 128;
    const worldHalfWidth = worldWidth / 2;
    const worldHalfDepth = worldDepth / 2;
    const data = generateHeight(worldWidth, worldDepth);

    const timer = new THREE.Timer();
    timer.connect(document);

    init();

    function init() {

      container = document.getElementById('container');

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        1,
        20000
      );

      camera.position.y = getY(worldHalfWidth, worldHalfDepth) * 100 + 120;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xbfd1e5);

      const matrix = new THREE.Matrix4();

      const pxGeometry = new THREE.PlaneGeometry(100, 100);
      pxGeometry.attributes.uv.array[1] = 0.5;
      pxGeometry.attributes.uv.array[3] = 0.5;
      pxGeometry.rotateY(Math.PI / 2);
      pxGeometry.translate(50, 0, 0);

      const nxGeometry = new THREE.PlaneGeometry(100, 100);
      nxGeometry.attributes.uv.array[1] = 0.5;
      nxGeometry.attributes.uv.array[3] = 0.5;
      nxGeometry.rotateY(-Math.PI / 2);
      nxGeometry.translate(-50, 0, 0);

      const pyGeometry = new THREE.PlaneGeometry(100, 100);
      pyGeometry.attributes.uv.array[5] = 0.5;
      pyGeometry.attributes.uv.array[7] = 0.5;
      pyGeometry.rotateX(-Math.PI / 2);
      pyGeometry.translate(0, 50, 0);

      const pzGeometry = new THREE.PlaneGeometry(100, 100);
      pzGeometry.attributes.uv.array[1] = 0.5;
      pzGeometry.attributes.uv.array[3] = 0.5;
      pzGeometry.translate(0, 0, 50);

      const nzGeometry = new THREE.PlaneGeometry(100, 100);
      nzGeometry.attributes.uv.array[1] = 0.5;
      nzGeometry.attributes.uv.array[3] = 0.5;
      nzGeometry.rotateY(Math.PI);
      nzGeometry.translate(0, 0, -50);

      const geometries = [];

      for (let z = 0; z < worldDepth; z++) {
        for (let x = 0; x < worldWidth; x++) {

          const h = getY(x, z);

          matrix.makeTranslation(
            x * 100 - worldHalfWidth * 100,
            h * 100,
            z * 100 - worldHalfDepth * 100
          );

          const px = getY(x + 1, z);
          const nx = getY(x - 1, z);
          const pz = getY(x, z + 1);
          const nz = getY(x, z - 1);

          geometries.push(pyGeometry.clone().applyMatrix4(matrix));

          if ((px !== h && px !== h + 1) || x === 0) {
            geometries.push(pxGeometry.clone().applyMatrix4(matrix));
          }

          if ((nx !== h && nx !== h + 1) || x === worldWidth - 1) {
            geometries.push(nxGeometry.clone().applyMatrix4(matrix));
          }

          if ((pz !== h && pz !== h + 1) || z === worldDepth - 1) {
            geometries.push(pzGeometry.clone().applyMatrix4(matrix));
          }

          if ((nz !== h && nz !== h + 1) || z === 0) {
            geometries.push(nzGeometry.clone().applyMatrix4(matrix));
          }
        }
      }

      const geometry = BufferGeometryUtils.mergeGeometries(geometries);
      geometry.computeBoundingSphere();

      const texture = new THREE.TextureLoader().load('./assets/textures/minecraft/atlas.png');
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.magFilter = THREE.NearestFilter;

      const mesh = new THREE.Mesh(
        geometry,
        new THREE.MeshLambertMaterial({
          map: texture,
          side: THREE.DoubleSide
        })
      );
      scene.add(mesh);

      const ambientLight = new THREE.AmbientLight(0xeeeeee, 3);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 12);
      directionalLight.position.set(1, 1, 0.5).normalize();
      scene.add(directionalLight);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setAnimationLoop(animate);
      container.appendChild(renderer.domElement);

      controls = new FirstPersonControls(camera, renderer.domElement);
      controls.movementSpeed = 400;
      controls.lookSpeed = 0.08;
      controls.lookVertical = true;
      controls.constrainVertical = true;
      controls.verticalMin = 1.1;
      controls.verticalMax = 2.2;

      stats = new Stats();
      container.appendChild(stats.dom);

      window.addEventListener('resize', onWindowResize);

      renderer.domElement.addEventListener('contextmenu', (event) => {
        event.preventDefault();
      });
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
      controls.handleResize();
    }

    function generateHeight(width, height) {
      const data = [];
      const perlin = new ImprovedNoise();
      const size = width * height;
      const z = Math.random() * 100;

      let quality = 2;

      for (let j = 0; j < 4; j++) {
        if (j === 0) {
          for (let i = 0; i < size; i++) data[i] = 0;
        }

        for (let i = 0; i < size; i++) {
          const x = i % width;
          const y = (i / width) | 0;
          data[i] += perlin.noise(x / quality, y / quality, z) * quality;
        }

        quality *= 4;
      }

      return data;
    }

    function getY(x, z) {
      if (x < 0 || x >= worldWidth || z < 0 || z >= worldDepth) return 0;
      return (data[x + z * worldWidth] * 0.15) | 0;
    }

    function animate() {
      timer.update();
      render();
      stats.update();
    }

    function render() {
      controls.update(timer.getDelta());

      const cameraX = Math.floor((camera.position.x + worldHalfWidth * 100) / 100);
      const cameraZ = Math.floor((camera.position.z + worldHalfDepth * 100) / 100);

      if (
        cameraX >= 0 && cameraX < worldWidth &&
        cameraZ >= 0 && cameraZ < worldDepth
      ) {
        const terrainY = getY(cameraX, cameraZ) * 100 + 120;

        if (camera.position.y < terrainY) {
          camera.position.y = terrainY;
        }
      }

      renderer.render(scene, camera);
    }
  </script>

</body>
</html>
