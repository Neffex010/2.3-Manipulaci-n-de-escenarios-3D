</head>
<body>

  <div id="info">

  <script type="importmap">
  {
    "imports": {
      "three": "./assets/build/three.module.js",
      "three/addons/": "./assets/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    import Stats from 'three/addons/libs/stats.module.js';
    import { FirstPersonControls } from 'three/addons/controls/FirstPersonControls.js';
    import { ImprovedNoise } from 'three/addons/math/ImprovedNoise.js';
    import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';

    let container, stats;
    let camera, controls, scene, renderer;

    const worldWidth = 128, worldDepth = 128;
    const worldHalfWidth = worldWidth / 2;
    const worldHalfDepth = worldDepth / 2;
    const data = generateHeight(worldWidth, worldDepth);

    const timer = new THREE.Timer();
    timer.connect(document);

    init();

    function init() {

      container = document.getElementById('container');

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 20000);
      camera.position.y = getY(worldHalfWidth, worldHalfDepth) * 100 + 120;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xbfd1e5);
      
      // 1. NIEBLA ATMOSFÉRICA
      scene.fog = new THREE.FogExp2(0xbfd1e5, 0.00025);

      const matrix = new THREE.Matrix4();

      const pxGeometry = new THREE.PlaneGeometry(100, 100);
      pxGeometry.attributes.uv.array[1] = 0.5; pxGeometry.attributes.uv.array[3] = 0.5;
      pxGeometry.rotateY(Math.PI / 2); pxGeometry.translate(50, 0, 0);

      const nxGeometry = new THREE.PlaneGeometry(100, 100);
      nxGeometry.attributes.uv.array[1] = 0.5; nxGeometry.attributes.uv.array[3] = 0.5;
      nxGeometry.rotateY(-Math.PI / 2); nxGeometry.translate(-50, 0, 0);

      const pyGeometry = new THREE.PlaneGeometry(100, 100);
      pyGeometry.attributes.uv.array[5] = 0.5; pyGeometry.attributes.uv.array[7] = 0.5;
      pyGeometry.rotateX(-Math.PI / 2); pyGeometry.translate(0, 50, 0);

      const pzGeometry = new THREE.PlaneGeometry(100, 100);
      pzGeometry.attributes.uv.array[1] = 0.5; pzGeometry.attributes.uv.array[3] = 0.5;
      pzGeometry.translate(0, 0, 50);

      const nzGeometry = new THREE.PlaneGeometry(100, 100);
      nzGeometry.attributes.uv.array[1] = 0.5; nzGeometry.attributes.uv.array[3] = 0.5;
      nzGeometry.rotateY(Math.PI); nzGeometry.translate(0, 0, -50);

      const geometries = [];

      // Función auxiliar para teñir los bloques según su altura (Biomas)
      function applyBiomeColor(geom, height) {
        const color = new THREE.Color();
        if (height <= 11) color.setHex(0xe8c792); // Arena
        else if (height <= 18) color.setHex(0xa8e68e); // Pasto brillante
        else if (height <= 24) color.setHex(0xaaaaaa); // Piedra
        else color.setHex(0xffffff); // Nieve
        
        const colors = [];
        const count = geom.attributes.position.count;
        for (let i = 0; i < count; i++) colors.push(color.r, color.g, color.b);
        geom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        return geom;
      }

      for (let z = 0; z < worldDepth; z++) {
        for (let x = 0; x < worldWidth; x++) {

          const h = getY(x, z);

          matrix.makeTranslation(
            x * 100 - worldHalfWidth * 100,
            h * 100,
            z * 100 - worldHalfDepth * 100
          );

          const px = getY(x + 1, z);
          const nx = getY(x - 1, z);
          const pz = getY(x, z + 1);
          const nz = getY(x, z - 1);

          // Agregamos las caras y las teñimos
          geometries.push(applyBiomeColor(pyGeometry.clone().applyMatrix4(matrix), h));

          if ((px !== h && px !== h + 1) || x === 0) {
            geometries.push(applyBiomeColor(pxGeometry.clone().applyMatrix4(matrix), h));
          }
          if ((nx !== h && nx !== h + 1) || x === worldWidth - 1) {
            geometries.push(applyBiomeColor(nxGeometry.clone().applyMatrix4(matrix), h));
          }
          if ((pz !== h && pz !== h + 1) || z === worldDepth - 1) {
            geometries.push(applyBiomeColor(pzGeometry.clone().applyMatrix4(matrix), h));
          }
          if ((nz !== h && nz !== h + 1) || z === 0) {
            geometries.push(applyBiomeColor(nzGeometry.clone().applyMatrix4(matrix), h));
          }
        }
      }

      const geometry = BufferGeometryUtils.mergeGeometries(geometries);
      geometry.computeBoundingSphere();

      const texture = new THREE.TextureLoader().load('./assets/textures/minecraft/atlas.png');
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.magFilter = THREE.NearestFilter;

      const mesh = new THREE.Mesh(
        geometry,
        new THREE.MeshLambertMaterial({
          map: texture,
          side: THREE.DoubleSide,
          vertexColors: true // Requerido para ver los tintes de biomas
        })
      );
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      // 2. NIVEL DEL AGUA
      const waterGeo = new THREE.PlaneGeometry(worldWidth * 100, worldDepth * 100);
      waterGeo.rotateX(-Math.PI / 2);
      const waterMat = new THREE.MeshLambertMaterial({ 
        color: 0x2288ff, 
        transparent: true, 
        opacity: 0.65,
        side: THREE.DoubleSide
      });
      const water = new THREE.Mesh(waterGeo, waterMat);
      water.position.y = 11.2 * 100; // Nivel del agua justo arriba del nivel 11
      water.receiveShadow = true;
      scene.add(water);

      // ILUMINACIÓN Y SOMBRAS
      const ambientLight = new THREE.AmbientLight(0xeeeeee, 1.2);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 3);
      directionalLight.position.set(5000, 6000, 4000);
      directionalLight.castShadow = true;
      
      // Ajustes de calidad de sombra para cubrir el mapa inmenso
      const d = 6000;
      directionalLight.shadow.camera.left = -d;
      directionalLight.shadow.camera.right = d;
      directionalLight.shadow.camera.top = d;
      directionalLight.shadow.camera.bottom = -d;
      directionalLight.shadow.camera.near = 100;
      directionalLight.shadow.camera.far = 15000;
      directionalLight.shadow.mapSize.width = 2048;
      directionalLight.shadow.mapSize.height = 2048;
      scene.add(directionalLight);

      // RENDERER
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true; // Activar sombras maestras
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.setAnimationLoop(animate);
      container.appendChild(renderer.domElement);

      // CONTROLES
      controls = new FirstPersonControls(camera, renderer.domElement);
      controls.movementSpeed = 600;
      controls.lookSpeed = 0.08;
      controls.lookVertical = true;
      controls.constrainVertical = true;
      controls.verticalMin = 1.1;
      controls.verticalMax = 2.2;

      // 3. STATS (FPS) - Posicionado abajo a la izquierda
      stats = new Stats();
      stats.dom.style.top = 'auto';
      stats.dom.style.bottom = '45px';
      stats.dom.style.left = '10px';
      container.appendChild(stats.dom);

      window.addEventListener('resize', onWindowResize);

      renderer.domElement.addEventListener('contextmenu', (event) => {
        event.preventDefault();
      });
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
      controls.handleResize();
    }

    function generateHeight(width, height) {
      const data = [];
      const perlin = new ImprovedNoise();
      const size = width * height;
      const z = Math.random() * 100;

      let quality = 2;

      for (let j = 0; j < 4; j++) {
        if (j === 0) {
          for (let i = 0; i < size; i++) data[i] = 0;
        }

        for (let i = 0; i < size; i++) {
          const x = i % width;
          const y = (i / width) | 0;
          data[i] += perlin.noise(x / quality, y / quality, z) * quality;
        }

        quality *= 4;
      }

      return data;
    }

    function getY(x, z) {
      if (x < 0 || x >= worldWidth || z < 0 || z >= worldDepth) return 0;
      return (data[x + z * worldWidth] * 0.15) | 0;
    }

    function animate() {
      timer.update();
      render();
      stats.update();
    }

    function render() {
      controls.update(timer.getDelta());

      const cameraX = Math.floor((camera.position.x + worldHalfWidth * 100) / 100);
      const cameraZ = Math.floor((camera.position.z + worldHalfDepth * 100) / 100);

      if (
        cameraX >= 0 && cameraX < worldWidth &&
        cameraZ >= 0 && cameraZ < worldDepth
      ) {
        const terrainY = getY(cameraX, cameraZ) * 100 + 120;

        if (camera.position.y < terrainY) {
          camera.position.y = terrainY;
        }
      }

      renderer.render(scene, camera);
    }
  </script>

</body>
</html>
