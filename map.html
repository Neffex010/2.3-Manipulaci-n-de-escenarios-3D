<script type="module">

import * as THREE from 'three';

import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
import { MapControls } from 'three/addons/controls/MapControls.js';

let camera, controls, scene, renderer;

init();

function init() {

  scene = new THREE.Scene();

  /* fondo y niebla mejorados */
  scene.background = new THREE.Color(0xdbe4ee);
  scene.fog = new THREE.FogExp2(0xdbe4ee, 0.0012);


  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setAnimationLoop(animate);

  document.body.appendChild(renderer.domElement);


  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    1,
    1000
  );

  camera.position.set(0, 200, -400);


  /* CONTROLES */

  controls = new MapControls(camera, renderer.domElement);

  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  controls.screenSpacePanning = false;

  controls.minDistance = 100;
  controls.maxDistance = 500;

  controls.maxPolarAngle = Math.PI / 2;


  /* ESCENA */

  const geometry = new THREE.BoxGeometry();
  geometry.translate(0, 0.5, 0);

  const material = new THREE.MeshPhongMaterial({
    color: 0x7c86b6,
    flatShading: true
  });

  const mesh = new THREE.InstancedMesh(geometry, material, 500);

  const dummy = new THREE.Object3D();

  for (let i = 0; i < 500; i++) {

    dummy.position.x = Math.random() * 1600 - 800;
    dummy.position.y = 0;
    dummy.position.z = Math.random() * 1600 - 800;

    dummy.scale.x = 20;
    dummy.scale.y = Math.random() * 80 + 10;
    dummy.scale.z = 20;

    dummy.updateMatrix();

    mesh.setMatrixAt(i, dummy.matrix);

  }

  scene.add(mesh);


  /* LUCES */

  const dirLight1 = new THREE.DirectionalLight(0xffffff, 2.5);
  dirLight1.position.set(1, 1, 1);
  scene.add(dirLight1);

  const dirLight2 = new THREE.DirectionalLight(0x4455aa, 2);
  dirLight2.position.set(-1, -1, -1);
  scene.add(dirLight2);

  const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
  scene.add(ambientLight);


  /* EVENTOS */

  window.addEventListener('resize', onWindowResize);


  /* GUI */

  const gui = new GUI();

  gui.add(controls, 'zoomToCursor');
  gui.add(controls, 'screenSpacePanning');

}


function onWindowResize() {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);

}


function animate() {

  controls.update();

  render();

}


function render() {

  renderer.render(scene, camera);

}

</script>
