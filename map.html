<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>three.js - map controls</title>

  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

  <link rel="stylesheet" href="./assets/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">

  <style>
    /* Estilos para el cuadro emergente (Tooltip) */
    #tooltip {
      position: absolute;
      display: none;
      background: rgba(17, 24, 39, 0.9);
      color: #f3f4f6;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      pointer-events: none;
      z-index: 300;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    #tooltip strong {
      color: #ef4444; /* Rojo para destacar el título */
      font-size: 15px;
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>

  <nav class="custom-navbar">
    <div class="nav-brand">Three.js Demos</div>
    <div class="nav-links">
      <a href="./index.html">Inicio</a>
      <a href="https://threejs.org" target="_blank" rel="noopener">Three.js</a>

    </div>

  <div id="info">
    <a href="https://threejs.org" target="_blank" rel="noopener">three.js</a>
    · Map Controls Demo<br>
    Pasa el ratón para resaltar un edificio y haz clic para ver información.
  </div>

  <div id="tooltip"></div>

  <footer class="custom-footer">
    &copy; 2026 Proyectos Three.js - Todos los derechos reservados
  </footer>
  <script type="importmap">
{
  "imports": {
    "three": "./assets/build/three.module.js",
    "three/addons/": "./assets/jsm/"
  }
}
</script>

<script type="module">

import * as THREE from 'three';

import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
import { MapControls } from 'three/addons/controls/MapControls.js';

let camera, controls, scene, renderer;
let raycaster, mouse;
let mesh;
let hoveredInstanceId = null;

const baseColor = new THREE.Color(0x7c86b6);
const highlightColor = new THREE.Color(0xdc2626); // Color rojo al pasar el ratón

const tooltip = document.getElementById('tooltip');

init();

function init() {

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xdbe4ee);
  scene.fog = new THREE.FogExp2(0xdbe4ee, 0.0012);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setAnimationLoop(animate);
  
  // 1. HABILITAMOS LAS SOMBRAS EN EL RENDERER
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  document.body.appendChild(renderer.domElement);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
  camera.position.set(0, 200, -400);

  /* CONTROLES */
  controls = new MapControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.screenSpacePanning = false;
  controls.minDistance = 100;
  controls.maxDistance = 600;
  controls.maxPolarAngle = Math.PI / 2.1; // Ligeramente ajustado para no ir tan abajo del suelo

  /* SUELO QUE RECIBE SOMBRAS */
  const planeGeometry = new THREE.PlaneGeometry( 4000, 4000 );
  const planeMaterial = new THREE.MeshPhongMaterial( { color: 0xdbe4ee, depthWrite: false } );
  const plane = new THREE.Mesh( planeGeometry, planeMaterial );
  plane.rotation.x = - Math.PI / 2;
  plane.receiveShadow = true; // El suelo recibe sombras
  scene.add( plane );

  /* ESCENA (InstancedMesh) */
  const geometry = new THREE.BoxGeometry();
  geometry.translate(0, 0.5, 0);

  const material = new THREE.MeshPhongMaterial({
    color: 0xffffff, // El material base lo ponemos blanco para poder teñirlo
    flatShading: true
  });

  mesh = new THREE.InstancedMesh(geometry, material, 500);
  mesh.castShadow = true;    // Las cajas generan sombra
  mesh.receiveShadow = true; // Las cajas reciben sombra entre sí

  const dummy = new THREE.Object3D();

  for (let i = 0; i < 500; i++) {
    dummy.position.x = Math.random() * 1600 - 800;
    dummy.position.y = 0;
    dummy.position.z = Math.random() * 1600 - 800;

    dummy.scale.x = 20;
    dummy.scale.y = Math.random() * 80 + 10;
    dummy.scale.z = 20;

    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
    
    // Asignamos el color base a todas las instancias
    mesh.setColorAt(i, baseColor);
  }

  scene.add(mesh);

  /* LUCES Y SOMBRAS */
  const dirLight1 = new THREE.DirectionalLight(0xffffff, 2.5);
  dirLight1.position.set(300, 400, 200);
  dirLight1.castShadow = true; // La luz genera sombra
  // Ajustes de calidad de sombra
  dirLight1.shadow.camera.top = 1000;
  dirLight1.shadow.camera.bottom = -1000;
  dirLight1.shadow.camera.left = -1000;
  dirLight1.shadow.camera.right = 1000;
  dirLight1.shadow.camera.near = 0.1;
  dirLight1.shadow.camera.far = 2000;
  dirLight1.shadow.mapSize.width = 2048;
  dirLight1.shadow.mapSize.height = 2048;
  scene.add(dirLight1);

  const dirLight2 = new THREE.DirectionalLight(0x4455aa, 1.5);
  dirLight2.position.set(-100, 200, -100);
  scene.add(dirLight2);

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);

  /* RAYCASTER PARA INTERACCIÓN */
  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  /* EVENTOS */
  window.addEventListener('resize', onWindowResize);
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('click', onClick);

  /* GUI */
  const gui = new GUI();
  gui.add(controls, 'zoomToCursor');
  gui.add(controls, 'screenSpacePanning');
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function onMouseMove(event) {
  // Calculamos la posición del ratón normalizada (-1 a +1)
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

function onClick(event) {
  // Solo mostrar el tooltip si se hizo clic en un edificio
  if (hoveredInstanceId !== null) {
    // Evitamos mostrar el tooltip si se hace clic en el Navbar
    if (event.clientY > 60) { 
      tooltip.style.display = 'block';
      tooltip.style.left = event.clientX + 15 + 'px';
      tooltip.style.top = event.clientY + 15 + 'px';
      
      // Información aleatoria para simular datos del edificio
      const pisos = Math.floor(Math.random() * 20) + 5;
      const estado = Math.random() > 0.5 ? 'Ocupado' : 'Disponible';
      
      tooltip.innerHTML = `
        <strong>Edificio #${hoveredInstanceId}</strong>
        Pisos: ${pisos}<br>
        Estado: ${estado}<br>
        Área: ${(Math.random() * 500 + 100).toFixed(0)} m²
      `;
    }
  } else {
    tooltip.style.display = 'none';
  }
}

function animate() {
  controls.update();
  
  // Actualizar Raycaster
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(mesh);

  if (intersects.length > 0) {
    const instanceId = intersects[0].instanceId;
    
    // Si pasamos a un nuevo edificio
    if (hoveredInstanceId !== instanceId) {
      // Restauramos el color del edificio anterior
      if (hoveredInstanceId !== null) {
        mesh.setColorAt(hoveredInstanceId, baseColor);
      }
      
      // Resaltamos el nuevo edificio
      hoveredInstanceId = instanceId;
      mesh.setColorAt(hoveredInstanceId, highlightColor);
      mesh.instanceColor.needsUpdate = true;
      document.body.style.cursor = 'pointer';
    }
  } else {
    // Si el ratón ya no está sobre ningún edificio
    if (hoveredInstanceId !== null) {
      mesh.setColorAt(hoveredInstanceId, baseColor);
      mesh.instanceColor.needsUpdate = true;
      hoveredInstanceId = null;
      document.body.style.cursor = 'default';
    }
  }

  render();
}

function render() {
  renderer.render(scene, camera);
}

</script>
</body>
</html>
