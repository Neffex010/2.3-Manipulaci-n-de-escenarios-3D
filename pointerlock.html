<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>three.js - pointerlock controls</title>
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

  <link rel="stylesheet" href="./assets/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧊</text></svg>">

  <style>
    #blocker {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      z-index: 15;
    }

    #instructions {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 15px;
      cursor: pointer;
      color: white;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #instructions p {
      margin: 8px 0;
    }

    #instructions .title {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    #instructions .hint {
      font-size: 15px;
      line-height: 1.7;
      opacity: 0.96;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 14px 18px;
      border-radius: 14px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <nav class="custom-navbar">
    <div class="nav-brand">Three.js Demos</div>
    
    <div class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="https://threejs.org" target="_blank" rel="noopener">Three.js</a>
      <a href="https://threejs.org/docs/" target="_blank" rel="noopener">Documentación</a>
      <a href="https://github.com/mrdoob/three.js/" target="_blank" rel="noopener">GitHub Repositorio Oficial</a>
    </div>
  </nav>

  <div id="blocker">
    <div id="instructions">
      <p class="title">Click to play</p>
      <p class="hint">
        Move: WASD<br>
        Jump: SPACE<br>
        Look: MOUSE
      </p>
    </div>
  </div>

  <div id="info">
    <a href="https://threejs.org" target="_blank" rel="noopener">three.js</a>
    · Pointer Lock Demo
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "./assets/build/three.module.js",
      "three/addons/": "./assets/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    let camera, scene, renderer, controls;

    const objects = [];

    let raycaster;

    let moveForward = false;
    let moveBackward = false;
    let moveLeft = false;
    let moveRight = false;
    let canJump = false;

    let prevTime = performance.now();

    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    const vertex = new THREE.Vector3();
    const color = new THREE.Color();

    init();

    function init() {

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
      camera.position.y = 10;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xd6e0ee);
      scene.fog = new THREE.Fog(0xd6e0ee, 0, 550);

      const light = new THREE.HemisphereLight(0xffffff, 0x445577, 1.8);
      light.position.set(0.5, 1, 0.75);
      scene.add(light);

      controls = new PointerLockControls(camera, document.body);

      const blocker = document.getElementById('blocker');
      const instructions = document.getElementById('instructions');

      instructions.addEventListener('click', function () {
        controls.lock();
      });

      controls.addEventListener('lock', function () {
        instructions.style.display = 'none';
        blocker.style.display = 'none';
      });

      controls.addEventListener('unlock', function () {
        blocker.style.display = 'block';
        instructions.style.display = '';
      });

      scene.add(controls.object);

      const onKeyDown = function (event) {

        switch (event.code) {
          case 'ArrowUp':
          case 'KeyW':
            moveForward = true;
            break;

          case 'ArrowLeft':
          case 'KeyA':
            moveLeft = true;
            break;

          case 'ArrowDown':
          case 'KeyS':
            moveBackward = true;
            break;

          case 'ArrowRight':
          case 'KeyD':
            moveRight = true;
            break;

          case 'Space':
            if (canJump === true) velocity.y += 350;
            canJump = false;
            break;
        }

      };

      const onKeyUp = function (event) {

        switch (event.code) {
          case 'ArrowUp':
          case 'KeyW':
            moveForward = false;
            break;

          case 'ArrowLeft':
          case 'KeyA':
            moveLeft = false;
            break;

          case 'ArrowDown':
          case 'KeyS':
            moveBackward = false;
            break;

          case 'ArrowRight':
          case 'KeyD':
            moveRight = false;
            break;
        }

      };

      document.addEventListener('keydown', onKeyDown);
      document.addEventListener('keyup', onKeyUp);

      raycaster = new THREE.Raycaster(
        new THREE.Vector3(),
        new THREE.Vector3(0, -1, 0),
        0,
        10
      );

      // FLOOR
      let floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100);
      floorGeometry.rotateX(-Math.PI / 2);

      let position = floorGeometry.attributes.position;

      for (let i = 0, l = position.count; i < l; i++) {
        vertex.fromBufferAttribute(position, i);

        vertex.x += Math.random() * 20 - 10;
        vertex.y += Math.random() * 2;
        vertex.z += Math.random() * 20 - 10;

        position.setXYZ(i, vertex.x, vertex.y, vertex.z);
      }

      floorGeometry = floorGeometry.toNonIndexed();

      position = floorGeometry.attributes.position;
      const colorsFloor = [];

      for (let i = 0, l = position.count; i < l; i++) {
        color.setHSL(
          Math.random() * 0.08 + 0.58,
          0.55,
          Math.random() * 0.15 + 0.45,
          THREE.SRGBColorSpace
        );
        colorsFloor.push(color.r, color.g, color.b);
      }

      floorGeometry.setAttribute(
        'color',
        new THREE.Float32BufferAttribute(colorsFloor, 3)
      );

      const floorMaterial = new THREE.MeshBasicMaterial({ vertexColors: true });
      const floor = new THREE.Mesh(floorGeometry, floorMaterial);
      scene.add(floor);

      // BOXES
      const boxGeometry = new THREE.BoxGeometry(20, 20, 20).toNonIndexed();

      position = boxGeometry.attributes.position;
      const colorsBox = [];

      for (let i = 0, l = position.count; i < l; i++) {
        color.setHSL(
          Math.random() * 0.05 + 0.60,
          0.65,
          Math.random() * 0.25 + 0.35,
          THREE.SRGBColorSpace
        );
        colorsBox.push(color.r, color.g, color.b);
      }

      boxGeometry.setAttribute(
        'color',
        new THREE.Float32BufferAttribute(colorsBox, 3)
      );

      for (let i = 0; i < 500; i++) {
        const boxMaterial = new THREE.MeshPhongMaterial({
          specular: 0xffffff,
          flatShading: true,
          vertexColors: true
        });

        boxMaterial.color.setHSL(
          Math.random() * 0.05 + 0.60,
          0.65,
          Math.random() * 0.25 + 0.35,
          THREE.SRGBColorSpace
        );

        const box = new THREE.Mesh(boxGeometry, boxMaterial);

        box.position.x = Math.floor(Math.random() * 20 - 10) * 20;
        box.position.y = Math.floor(Math.random() * 20) * 20 + 10;
        box.position.z = Math.floor(Math.random() * 20 - 10) * 20;

        scene.add(box);
        objects.push(box);
      }

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setAnimationLoop(animate);
      document.body.appendChild(renderer.domElement);

      window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      const time = performance.now();

      if (controls.isLocked === true) {
        raycaster.ray.origin.copy(controls.object.position);
        raycaster.ray.origin.y -= 10;

        const intersections = raycaster.intersectObjects(objects, false);
        const onObject = intersections.length > 0;

        const delta = (time - prevTime) / 1000;

        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;
        velocity.y -= 9.8 * 100.0 * delta;

        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
        if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

        if (onObject === true) {
          velocity.y = Math.max(0, velocity.y);
          canJump = true;
        }

        controls.moveRight(-velocity.x * delta);
        controls.moveForward(-velocity.z * delta);

        controls.object.position.y += velocity.y * delta;

        if (controls.object.position.y < 10) {
          velocity.y = 0;
          controls.object.position.y = 10;
          canJump = true;
        }
      }

      prevTime = time;
      renderer.render(scene, camera);
    }
  </script>
  <footer class="custom-footer">
    &copy; 2026 Luis Enrique Cabrera García - Proyectos Three.js
  </footer>
</body>
</html>
